<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <!-- Background -->
  <rect width="400" height="225" fill="#fefefe"/>
  
  <!-- Decorative border -->
  <rect x="20" y="20" width="360" height="185" fill="none" stroke="#d4a574" stroke-width="2" stroke-dasharray="4 4"/>
  
  <!-- Rose accent -->
  <circle cx="50" cy="50" r="15" fill="#e8b4a0" opacity="0.3"/>
  <circle cx="350" cy="175" r="12" fill="#e8b4a0" opacity="0.3"/>
  
  <!-- Typography preview -->
  <text x="200" y="100" font-family="serif" font-size="24" fill="#2c1810" text-anchor="middle" font-weight="bold">Classic</text>
  <text x="200" y="130" font-family="serif" font-size="14" fill="#6b5d52" text-anchor="middle">Elegant &amp; Traditional</text>
  
  <!-- Decorative line -->
  <line x1="120" y1="150" x2="280" y2="150" stroke="#d4a574" stroke-width="1"/>
</svg>
