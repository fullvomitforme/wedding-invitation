<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <!-- Clean white background -->
  <rect width="400" height="225" fill="#ffffff"/>
  
  <!-- Minimalist elements -->
  <rect x="50" y="50" width="300" height="125" fill="none" stroke="#000000" stroke-width="1"/>
  
  <!-- Simple typography -->
  <text x="200" y="110" font-family="sans-serif" font-size="32" fill="#000000" text-anchor="middle" font-weight="300" letter-spacing="4px">MINIMALIST</text>
  
  <!-- Minimal accent -->
  <line x1="120" y1="140" x2="280" y2="140" stroke="#000000" stroke-width="1"/>
  
  <!-- Whitespace emphasis - just clean design -->
</svg>
