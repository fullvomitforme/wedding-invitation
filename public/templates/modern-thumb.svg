<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <!-- Dark background -->
  <rect width="400" height="225" fill="#0f172a"/>
  
  <!-- Gradient accent -->
  <defs>
    <linearGradient id="modernGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Asymmetric grid elements -->
  <rect x="30" y="40" width="120" height="80" fill="url(#modernGrad)" opacity="0.2"/>
  <rect x="250" y="100" width="120" height="80" fill="url(#modernGrad)" opacity="0.15"/>
  
  <!-- Typography -->
  <text x="200" y="110" font-family="sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">Modern</text>
  <text x="200" y="140" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" letter-spacing="2px">BOLD &amp; DARK</text>
  
  <!-- Accent line -->
  <line x1="150" y1="160" x2="250" y2="160" stroke="url(#modernGrad)" stroke-width="3"/>
</svg>
